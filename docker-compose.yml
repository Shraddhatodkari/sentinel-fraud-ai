version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override to point at the local mongo service instead of Atlas
      # when running fully locally for development.
      - MONGODB_URI=mongodb://mongo:27017
    depends_on:
      - mongo
    volumes:
      - ./data:/app/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
